{{ define "login" }}

{{ template "header" . }}

<div {{ with $.platform_css }} class="{{.}}" {{ end }}>
    <span class="platform-flag">
        {{$.platform_name}}
    </span>
</div>

<main role="main" class="login-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="login-container">
                    <div class="login-form-container">
                        <h2>Login</h2>
                        <form id="loginForm">
                            <div class="form-group">
                                <label for="username">Username:</label>
                                <div class="input-container">
                                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M20.59 22C20.59 18.13 16.74 15 12 15C7.26 15 3.41 18.13 3.41 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    <input type="text" id="username" name="username" placeholder="admin" required>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="password">Password:</label>
                                <div class="input-container">
                                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                                        <circle cx="12" cy="16" r="1" fill="currentColor"/>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>

                            <button type="submit" id="loginButton">
                                <span class="button-text">Login</span>
                                <svg class="button-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-left: 8px;">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </form>
                        
                        <div id="message" class="message" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
// Login form submit handler — calls /api/login (CTF #63-64: RUM-APM trace correlation)
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const loginButton = document.getElementById('loginButton');
    const messageDiv = document.getElementById('message');
    
    // Disable button and show loading state
    loginButton.disabled = true;
    loginButton.innerHTML = '<span class="spinner"></span><span>Logging in...</span>';
    messageDiv.style.display = 'block';
    messageDiv.className = 'message loading';
    messageDiv.textContent = 'Signing in...';
    
    try {
        // AbortController timeout set to 5 minutes (allows lock contention to complete — CTF #65)
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 300000); // 5 minutes
        
        // Call /api/login via Fetch — RUM SDK automatically injects trace propagation headers
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
                // Tracing headers injected automatically by the RUM SDK (CTF #63)
            },
            body: JSON.stringify({
                username: username,
                password: password
            }),
            signal: controller.signal  // Timeout control
        });
        
        clearTimeout(timeoutId);  // Clear timeout on successful response
        
        const result = await response.json();
        
        if (response.ok && result.success) {
            messageDiv.className = 'message success';
            messageDiv.textContent = 'Login successful! Redirecting...';
            
            // Brief delay before redirect so the success message is visible
            setTimeout(() => {
                window.location.href = result.redirectUrl || '/';
            }, 1000);
        } else {
            messageDiv.className = 'message error';
            messageDiv.textContent = result.message || 'Login failed.';
            
            // Re-enable button on error
            loginButton.disabled = false;
            loginButton.innerHTML = '<span class="button-text">Login</span><svg class="button-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-left: 8px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        }
    } catch (error) {
        console.error('Login error:', error);
        
        if (error.name === 'AbortError') {
            messageDiv.className = 'message error';
            messageDiv.textContent = 'Request timed out (5 minutes elapsed).';
        } else {
            messageDiv.className = 'message error';
            messageDiv.textContent = 'Network error. Please try again.';
        }
        
        // Re-enable button on error
        loginButton.disabled = false;
        loginButton.innerHTML = '<span class="button-text">Login</span><svg class="button-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-left: 8px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }
});

// Debug: confirm Datadog RUM is loaded and allowedTracingUrls is configured
if (window.DD_RUM) {
    console.log('✅ Datadog RUM detected');
    console.log('ℹ️  Check allowedTracingUrls configuration');
} else {
    console.log('⚠️  Datadog RUM not detected');
}
</script>
</main>

{{ template "footer" . }}

{{ end }}
