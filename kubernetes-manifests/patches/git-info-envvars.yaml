# JSON 6902 patch — appends Datadog Code Origin env vars to the first container
# of every targeted Deployment.
# DD_GIT_* values are read from the "git-info" ConfigMap created by deploy.sh
# before each deploy.  optional: true lets pods start even without the ConfigMap.
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: DD_GIT_COMMIT_SHA
    valueFrom:
      configMapKeyRef:
        name: git-info
        key: DD_GIT_COMMIT_SHA
        optional: true
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: DD_GIT_REPOSITORY_URL
    valueFrom:
      configMapKeyRef:
        name: git-info
        key: DD_GIT_REPOSITORY_URL
        optional: true
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: DD_CODE_ORIGIN_FOR_SPANS_ENABLED
    value: "true"
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: DD_APPSEC_ENABLED
    value: "true"
