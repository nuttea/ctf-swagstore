# Attack Simulator for Datadog AAP Testing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attack-simulator
  labels:
    app: attack-simulator
    purpose: security-testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attack-simulator
  template:
    metadata:
      labels:
        app: attack-simulator
        purpose: security-testing
    spec:
      containers:
      - name: attack-simulator
        image: attack-simulator
        imagePullPolicy: Always
        env:
        - name: FRONTEND_URL
          value: "http://frontend"
        - name: ATTACK_INTERVAL
          value: "300"  # Run regular attack suite every 5 minutes
        - name: LATENCY_ATTACK_INTERVAL
          value: "3600"  # Run latency degradation attack every 1 hour
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

