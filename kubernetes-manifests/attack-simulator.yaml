# Attack Simulator for Datadog AAP Testing (CTF #44-46, #54, #56-59)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attack-simulator
  labels:
    app: attack-simulator
    purpose: security-testing
    tags.datadoghq.com/env: "ctf"
    tags.datadoghq.com/service: "attack-simulator"
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: attack-simulator
  template:
    metadata:
      labels:
        app: attack-simulator
        purpose: security-testing
        tags.datadoghq.com/env: "ctf"
        tags.datadoghq.com/service: "attack-simulator"
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        ad.datadoghq.com/attack-simulator.logs: '[{"source": "python", "service": "attack-simulator"}]'
    spec:
      containers:
      - name: attack-simulator
        image: attack-simulator
        imagePullPolicy: Always
        env:
        - name: DD_ENV
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tags.datadoghq.com/env']
        - name: DD_SERVICE
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tags.datadoghq.com/service']
        - name: DD_VERSION
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tags.datadoghq.com/version']
        - name: FRONTEND_URL
          value: "http://frontend"
        - name: ATTACK_INTERVAL
          value: "300"  # Run regular attack suite every 5 minutes
        - name: LATENCY_ATTACK_INTERVAL
          value: "3600"  # Run latency degradation attack every 1 hour
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

