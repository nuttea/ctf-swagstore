apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgenerator
spec:
  selector:
    matchLabels:
      app: loadgenerator
  replicas: 1
  template:
    metadata:
      labels:
        app: loadgenerator
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 5
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
      - command:
        - /bin/sh
        - -exc
        - |
          # Poll /_healthz (not /) so attack-simulator 500s on the root path
          # don't cause a false failure. Retry up to 10 times with 3s backoff.
          echo "Init container pinging frontend: ${FRONTEND_ADDR}..."
          for i in $(seq 1 10); do
            STATUSCODE=$(wget --server-response http://${FRONTEND_ADDR}/_healthz 2>&1 | awk '/^  HTTP/{print $2}' | tail -1)
            if test "${STATUSCODE}" = "200"; then
              echo "Frontend is ready (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}: Status ${STATUSCODE}, retrying in 3s..."
            sleep 3
          done
          echo "Error: Could not reach frontend after 10 attempts - last status: ${STATUSCODE}"
          exit 1
        name: frontend-check
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - all
          privileged: false
          readOnlyRootFilesystem: true
        image: busybox:latest
        env:
        - name: FRONTEND_ADDR
          value: "frontend:80"
      containers:
      - name: main
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - all
          privileged: false
          readOnlyRootFilesystem: true
        image: loadgenerator
        #image: gcr.io/datadog-ese-sandbox/loadgenerator:latest
        env:
        - name: FRONTEND_ADDR
          value: "frontend:80"
        - name: USERS
          value: "10"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
